<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alexandria</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><path d=%22M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z%22 fill=%22%237c6ff7%22/><path d=%22M14 2L14 8L20 8Z%22 fill=%22%235a4fd4%22/></svg>" />
  <meta name="description"
    content="Upload Word documents — timestamps removed, paragraphs cleaned. Process up to 3 at once." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="header">
    <h1>📄 Alexandria</h1>
    <p>Drop up to 3 documents — each processed in parallel, results ready independently.</p>
  </header>

  <main class="card">

    <!-- Single drop zone -->
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".docx" />
      <span class="drop-icon">📂</span>
      <div class="label">Drop .docx here</div>
      <div class="sublabel">or tap to browse</div>
    </div>

    <!-- 3 slots -->
    <div class="slots" id="slotsPanel">

      <div class="slot" id="slot-0" data-state="idle">
        <span class="slot-num">01</span>
        <span class="slot-name" id="slot-name-0">—</span>
        <div class="slot-mid" id="slot-mid-0"></div>
        <div class="slot-actions">
          <button class="slot-clear-btn" id="slot-clear-0" hidden title="Clear slot">✕</button>
          <button class="btn-ghost slot-open-btn" id="slot-open-0" hidden>Open</button>
          <button class="btn-icon slot-dl-btn" id="slot-dl-0" hidden title="Download">⬇</button>
        </div>
      </div>

      <div class="slot" id="slot-1" data-state="idle">
        <span class="slot-num">02</span>
        <span class="slot-name" id="slot-name-1">—</span>
        <div class="slot-mid" id="slot-mid-1"></div>
        <div class="slot-actions">
          <button class="slot-clear-btn" id="slot-clear-1" hidden title="Clear slot">✕</button>
          <button class="btn-ghost slot-open-btn" id="slot-open-1" hidden>Open</button>
          <button class="btn-icon slot-dl-btn" id="slot-dl-1" hidden title="Download">⬇</button>
        </div>
      </div>

      <div class="slot" id="slot-2" data-state="idle">
        <span class="slot-num">03</span>
        <span class="slot-name" id="slot-name-2">—</span>
        <div class="slot-mid" id="slot-mid-2"></div>
        <div class="slot-actions">
          <button class="slot-clear-btn" id="slot-clear-2" hidden title="Clear slot">✕</button>
          <button class="btn-ghost slot-open-btn" id="slot-open-2" hidden>Open</button>
          <button class="btn-icon slot-dl-btn" id="slot-dl-2" hidden title="Download">⬇</button>
        </div>
      </div>

    </div>

    <!-- Preview panel -->
    <section id="previewSection" hidden>
      <div class="preview-divider"></div>
      <div class="preview-header">
        <div class="preview-actions">
          <button class="btn-ghost-purple" id="closePreviewBtn">Delete</button>
          <button class="btn" id="downloadBtn">⬇ Download</button>
        </div>
      </div>
      <div class="preview-meta" id="previewMeta"></div>
      <div class="preview-body" id="previewBody"></div>
    </section>

  </main>

  <footer class="footer">Files are processed instantly and never stored.</footer>

  <script src="app.js"></script>
</body>

</html>

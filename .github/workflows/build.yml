name: Build & Release Alexandria

on:
  push:
    tags:
      - 'v*.*'   # triggers when you push a tag like v1.0

permissions:
  contents: write

jobs:
  # ── Windows .exe ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build .exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name Alexandria
          --hidden-import filter
          app.py

      - name: Upload Windows build to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Alexandria.exe
          body: |
            ## Download Alexandria

            | Your computer | Download |
            |---|---|
            | **Windows** | `Alexandria.exe` – just double-click, no install needed |
            | **Mac** | `Alexandria-Mac.zip` – extract, then double-click `Alexandria.app` *(uploading…)* |

            > **Mac tip:** If macOS blocks the app the first time, right-click it → Open → Open.

            ---
            Cleaned files are saved to your Desktop in a folder called **Alexandria Output**.

  # ── macOS .app ──────────────────────────────────────────────────────────────
  # macos-13 = Intel runner → works on both Intel and Apple Silicon (via Rosetta)
  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tk for macOS
        run: brew install python-tk@3.11

      - name: Install dependencies
        run: pip install pyinstaller python-docx

      - name: Build .app
        run: >
          pyinstaller
          --windowed
          --name Alexandria
          --hidden-import filter
          --collect-submodules tkinter
          app.py

      - name: Zip the .app
        run: cd dist && zip -r Alexandria-Mac.zip Alexandria.app

      - name: Upload Mac build to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Alexandria-Mac.zip
